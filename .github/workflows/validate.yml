name: validate

on:
  push:
  pull_request:

jobs:
  skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python3 tools/build.py
      - run: python3 -m unittest discover -s tests -v
